<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Heart Disease Predictor</h1>
        <p>Please enter the following health metrics:</p>
        
        <form id="predictionForm">
            <div class="form-grid">
                {% for col in columns %}
                <div class="input-group">
                    <label for="{{ col }}">{{ col | replace('_', ' ') | title }}:</label>
                    <input type="number" step="any" id="{{ col }}" name="{{ col }}" required>
                </div>
                {% endfor %}
            </div>

            <button type="submit">Analyze Health Data</button>
        </form>

        <div id="resultBox" class="hidden">
            <h2>Result: <span id="predictionText"></span></h2>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
